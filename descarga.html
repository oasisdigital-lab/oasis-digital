<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso inmediato - Oasis Digital</title>
  <meta name="description" content="Acceso inmediato a la descarga de la guía gratuita de Oasis Digital." />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f5f1ea;
      color: #2f3a2c;
      line-height: 1.6;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    header {
      padding: 24px 0;
    }

    .brand {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8d7448;
    }

    .btn {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 16px;
      display: inline-block;
      transition: all 0.2s ease;
      border: 0;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #2f3a2c;
      color: white;
    }

    .btn-secondary {
      border: 1px solid #2f3a2c;
      color: #2f3a2c;
      background: transparent;
    }

    .guide-section {
      padding-top: 12px;
      padding-bottom: 64px;
    }

    .guide-box {
      background: rgba(255,255,255,0.72);
      border: 1px solid #dfd3c0;
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
      margin-top: 18px;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 13px;
      color: #8d7448;
      margin-bottom: 12px;
    }

    .guide-box h2 {
      font-size: 46px;
      line-height: 1.15;
      margin-bottom: 16px;
      max-width: 900px;
    }

    .guide-box p {
      font-size: 20px;
      color: #556251;
      max-width: 820px;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    footer {
      padding: 24px 0 50px;
      text-align: center;
      color: #7a7a7a;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .guide-box h2 {
        font-size: 34px;
      }

      .guide-box p {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <header class="container">
    <div class="brand">Oasis Digital</div>
  </header>

  <main class="container">
    <section class="guide-section">
      <div class="guide-box">
        <div class="eyebrow">Acceso inmediato</div>
        <h2>¡Listo! Tu descarga está preparada</h2>
        <p>
          Ya te registraste. Haz clic en el botón para descargar tu guía gratuita en formato PDF.
        </p>

        <div class="actions">
          <a
            class="btn btn-primary"
            href="GuiaGratuita.pdf"
            download="GuiaGratuita.pdf"
          >
            Descargar el PDF
          </a>
          <a class="btn btn-secondary" href="index.html">
            Volver al inicio
          </a>
        </div>

        <p style="margin-top:18px; font-size:14px; color:#8d7448; font-family: Arial, sans-serif;">
          Si tu navegador no inicia la descarga automáticamente, usa el botón de arriba.
        </p>
      </div>
    </section>
  </main>

  <footer class="container">
    © 2026 Oasis Digital
  </footer>
</body>
</html>
